services:
  - type: web
    name: lc-compliance-api
    runtime: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

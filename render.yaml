services:
  - type: web
    name: lc-compliance-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

services:
  - type: web
    name: lc-compliance-api
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      apt-get update && apt-get install -y tesseract-ocr
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
